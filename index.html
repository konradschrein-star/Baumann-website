<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DER BAUMANN - Design Auswahl</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>DER BAUMANN</h1>
            <p class="subtitle">Wählen Sie Ihr bevorzugtes Webseiten-Design</p>
        </header>

        <div class="designs-grid">
            <!-- Design 1 -->
            <div class="design-card">
                <div class="browser-mockup">
                    <div class="browser-header">
                        <div class="browser-dots">
                            <span class="dot red"></span>
                            <span class="dot yellow"></span>
                            <span class="dot green"></span>
                        </div>
                        <div class="browser-url">derbaumann.de</div>
                    </div>
                    <div class="browser-content">
                        <iframe src="design1/index.html" frameborder="0"></iframe>
                    </div>
                </div>
                <div class="card-footer">
                    <h2>Design 1</h2>
                    <p>Premium Handwerker-Website</p>
                    <a href="design1/index.html" class="btn-view">Design ansehen</a>
                </div>
            </div>

            <!-- Design 2 -->
            <div class="design-card">
                <div class="browser-mockup">
                    <div class="browser-header">
                        <div class="browser-dots">
                            <span class="dot red"></span>
                            <span class="dot yellow"></span>
                            <span class="dot green"></span>
                        </div>
                        <div class="browser-url">derbaumann.de</div>
                    </div>
                    <div class="browser-content coming-soon">
                        <div class="placeholder">
                            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="3" width="18" height="18" rx="2"/>
                                <path d="M3 9h18"/>
                                <path d="M9 21V9"/>
                            </svg>
                            <p>Folgt in Kürze</p>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <h2>Design 2</h2>
                    <p>Wird geladen...</p>
                    <button class="btn-view disabled" disabled>Folgt in Kürze</button>
                </div>
            </div>

            <!-- Design 3 -->
            <div class="design-card">
                <div class="browser-mockup">
                    <div class="browser-header">
                        <div class="browser-dots">
                            <span class="dot red"></span>
                            <span class="dot yellow"></span>
                            <span class="dot green"></span>
                        </div>
                        <div class="browser-url">derbaumann.de</div>
                    </div>
                    <div class="browser-content coming-soon">
                        <div class="placeholder">
                            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="3" width="18" height="18" rx="2"/>
                                <path d="M3 9h18"/>
                                <path d="M9 21V9"/>
                            </svg>
                            <p>Folgt in Kürze</p>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <h2>Design 3</h2>
                    <p>Wird geladen...</p>
                    <button class="btn-view disabled" disabled>Folgt in Kürze</button>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>Terrassenbau & Handwerk aus Dresden-Strehlen</p>
        </footer>
    </div>
</body>
</html>
